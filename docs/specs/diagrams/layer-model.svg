<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="layer5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="autonomyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Aquarius Work Protocol — Five-Layer Architecture</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#64748b">Each layer handles one concern. Layers communicate only with their neighbors.</text>

  <!-- Layer 5: Outcome -->
  <rect x="80" y="80" width="520" height="88" rx="12" fill="url(#layer5)" filter="url(#shadow)"/>
  <text x="100" y="112" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">LAYER 5</text>
  <text x="100" y="134" font-size="18" font-weight="700" fill="#fff">Outcome</text>
  <text x="100" y="155" font-size="12" fill="rgba(255,255,255,0.85)">Human-facing goals. Orchestrates 1+ contracts toward a user's intent.</text>
  <text x="520" y="115" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Dorothy: "Get reliable home help"</text>
  <text x="520" y="132" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Ahmed: "Sort out my business taxes"</text>
  <text x="520" y="149" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Alex: "Migrate clients from Upwork"</text>

  <!-- Layer 4: Contract -->
  <rect x="80" y="178" width="520" height="88" rx="12" fill="url(#layer4)" filter="url(#shadow)"/>
  <text x="100" y="210" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">LAYER 4</text>
  <text x="100" y="232" font-size="18" font-weight="700" fill="#fff">Contract</text>
  <text x="100" y="253" font-size="12" fill="rgba(255,255,255,0.85)">The protocol primitive. Terms, acceptance criteria, payment, state machine.</text>
  <text x="520" y="215" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Interop boundary — what gets standardized</text>
  <text x="520" y="232" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">External platforms speak contracts</text>

  <!-- Layer 3: Execution -->
  <rect x="80" y="276" width="520" height="88" rx="12" fill="url(#layer3)" filter="url(#shadow)"/>
  <text x="100" y="308" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">LAYER 3</text>
  <text x="100" y="330" font-size="18" font-weight="700" fill="#fff">Execution</text>
  <text x="100" y="351" font-size="12" fill="rgba(255,255,255,0.85)">Task decomposition, assignment, progress tracking, handoffs (AI↔human↔platform).</text>
  <text x="520" y="315" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Maps to AquaBot task runner</text>
  <text x="520" y="332" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Handoff protocol lives here</text>

  <!-- Layer 2: Capability -->
  <rect x="80" y="374" width="520" height="88" rx="12" fill="url(#layer2)" filter="url(#shadow)"/>
  <text x="100" y="406" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">LAYER 2</text>
  <text x="100" y="428" font-size="18" font-weight="700" fill="#fff">Capability</text>
  <text x="100" y="449" font-size="12" fill="rgba(255,255,255,0.85)">What can this participant do? Confidence scores, verified skills, platform adapters.</text>
  <text x="520" y="413" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">External platforms plug in here</text>
  <text x="520" y="430" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Fiverr adapter, Upwork adapter, etc.</text>

  <!-- Layer 1: Identity -->
  <rect x="80" y="472" width="520" height="88" rx="12" fill="url(#layer1)" filter="url(#shadow)"/>
  <text x="100" y="504" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)">LAYER 1</text>
  <text x="100" y="526" font-size="18" font-weight="700" fill="#fff">Identity</text>
  <text x="100" y="547" font-size="12" fill="rgba(255,255,255,0.85)">Who/what are you? Human, agent, platform. Trust level, autonomy settings, auth.</text>
  <text x="520" y="511" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Autonomy level configured here</text>
  <text x="520" y="528" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="end">Delegation chains tracked here</text>

  <!-- Autonomy cross-cutting concern -->
  <rect x="640" y="178" width="130" height="382" rx="10" fill="none" stroke="url(#autonomyGrad)" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="705" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#f43f5e">AUTONOMY</text>
  <text x="705" y="228" text-anchor="middle" font-size="10" fill="#64748b">Cross-cutting</text>
  <text x="705" y="243" text-anchor="middle" font-size="10" fill="#64748b">concern</text>

  <!-- Autonomy levels -->
  <rect x="652" y="265" width="106" height="26" rx="6" fill="#fef2f2"/>
  <text x="705" y="283" text-anchor="middle" font-size="10" fill="#f43f5e">Delegate</text>
  <rect x="652" y="299" width="106" height="26" rx="6" fill="#fef2f2"/>
  <text x="705" y="317" text-anchor="middle" font-size="10" fill="#f43f5e">Agent</text>
  <rect x="652" y="333" width="106" height="26" rx="6" fill="#fef2f2"/>
  <text x="705" y="351" text-anchor="middle" font-size="10" fill="#f43f5e">Facilitator</text>
  <rect x="652" y="367" width="106" height="26" rx="6" fill="#fef2f2"/>
  <text x="705" y="385" text-anchor="middle" font-size="10" fill="#f43f5e">Advisor</text>

  <text x="705" y="420" text-anchor="middle" font-size="10" fill="#64748b">Modifies transition</text>
  <text x="705" y="435" text-anchor="middle" font-size="10" fill="#64748b">rules across</text>
  <text x="705" y="450" text-anchor="middle" font-size="10" fill="#64748b">layers 3–5</text>

  <!-- Arrows between layers -->
  <line x1="340" y1="168" x2="340" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="340" y1="266" x2="340" y2="276" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="340" y1="364" x2="340" y2="374" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="340" y1="462" x2="340" y2="472" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- User label -->
  <text x="340" y="590" text-anchor="middle" font-size="11" fill="#94a3b8">Users interact at Layer 5 · External platforms plug in at Layer 2 · Contracts (Layer 4) are the interop boundary</text>
</svg>