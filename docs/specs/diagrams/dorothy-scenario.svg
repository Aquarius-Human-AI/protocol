<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Real-World Scenario: Dorothy's Home Help</text>
  <text x="440" y="50" text-anchor="middle" font-size="12" fill="#64748b">71-year-old widow, tech-comfort 1, autonomy: Delegate — "I need a handyman I can trust"</text>

  <!-- Outcome box at top -->
  <rect x="240" y="70" width="400" height="50" rx="12" fill="#6366f1" filter="url(#shadow)"/>
  <text x="440" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Outcome: "Get reliable home help"</text>
  <text x="440" y="108" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Layer 5 — what Dorothy sees</text>

  <!-- Connection lines from Outcome to contracts -->
  <line x1="340" y1="120" x2="160" y2="155" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="120" x2="440" y2="155" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="120" x2="720" y2="155" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Contract 1: Gutter cleaning -->
  <rect x="30" y="158" width="260" height="350" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="158" width="260" height="36" rx="10" fill="#22c55e"/>
  <rect x="30" y="180" width="260" height="14" fill="#22c55e"/>
  <text x="160" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Contract 1: Gutter Cleaning</text>
  <rect x="48" y="206" width="76" height="22" rx="6" fill="#dcfce7"/>
  <text x="86" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">COMPLETE</text>

  <text x="48" y="252" font-size="10" font-weight="600" fill="#64748b">State transitions:</text>
  <text x="48" y="270" font-size="10" fill="#1e293b">1. INTENT — "gutters need cleaning"</text>
  <text x="48" y="288" font-size="10" fill="#1e293b">2. REQUIREMENTS — one-story, 1200sqft</text>
  <text x="48" y="306" font-size="10" fill="#1e293b">3. MATCHING — 2 local handymen found</text>
  <text x="48" y="324" font-size="10" fill="#1e293b">4. PROPOSAL — Mike: $85, Tuesday 2pm</text>
  <text x="48" y="342" font-size="10" fill="#1e293b">5. NEGOTIATION — auto-accepted</text>
  <text x="48" y="360" font-size="10" fill="#1e293b">6. ACTIVE — Mike confirmed</text>
  <text x="48" y="378" font-size="10" fill="#1e293b">7. VERIFICATION — Dorothy: "looks great!"</text>
  <text x="48" y="396" font-size="10" fill="#22c55e" font-weight="600">8. COMPLETE — $85 released to Mike</text>

  <text x="48" y="424" font-size="10" font-weight="600" fill="#64748b">Handoffs:</text>
  <text x="48" y="442" font-size="10" fill="#1e293b">AI → Mike (capability: physical work)</text>
  <text x="48" y="458" font-size="10" fill="#1e293b">AI → Dorothy (confirm completion)</text>

  <text x="48" y="486" font-size="10" font-weight="600" fill="#64748b">Autonomy gates: all auto</text>
  <text x="48" y="500" font-size="10" fill="#1e293b">Delegate + $85 (low-risk) = no blocks</text>

  <!-- Contract 2: Thermostat -->
  <rect x="310" y="158" width="260" height="350" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="310" y="158" width="260" height="36" rx="10" fill="#3b82f6"/>
  <rect x="310" y="180" width="260" height="14" fill="#3b82f6"/>
  <text x="440" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Contract 2: Thermostat Help</text>
  <rect x="328" y="206" width="76" height="22" rx="6" fill="#dbeafe"/>
  <text x="366" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">MATCHING</text>

  <text x="328" y="252" font-size="10" font-weight="600" fill="#64748b">State transitions:</text>
  <text x="328" y="270" font-size="10" fill="#1e293b">1. INTENT — "thermostat confusing"</text>
  <text x="328" y="288" font-size="10" fill="#1e293b">2. REQUIREMENTS — Honeywell T6,</text>
  <text x="338" y="304" font-size="10" fill="#1e293b">   in-person or video walkthrough</text>
  <text x="328" y="324" font-size="10" fill="#3b82f6" font-weight="600">3. MATCHING — searching for</text>
  <text x="338" y="340" font-size="10" fill="#3b82f6" font-weight="600">   tech-savvy handyman nearby...</text>

  <text x="328" y="374" font-size="10" font-weight="600" fill="#64748b">Matching considerations:</text>
  <text x="328" y="392" font-size="10" fill="#1e293b">- Needs patience (no rushing)</text>
  <text x="328" y="408" font-size="10" fill="#1e293b">- Prefers warmth, "good people"</text>
  <text x="328" y="424" font-size="10" fill="#1e293b">- Rural area = limited candidates</text>
  <text x="328" y="440" font-size="10" fill="#1e293b">- Budget-conscious but reliable</text>

  <text x="328" y="472" font-size="10" font-weight="600" fill="#64748b">Confidence: 0.72</text>
  <text x="328" y="490" font-size="10" fill="#b45309">Uncertainty: rural, few candidates</text>

  <!-- Contract 3: iPad tutoring -->
  <rect x="590" y="158" width="260" height="350" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="590" y="158" width="260" height="36" rx="10" fill="#8b5cf6"/>
  <rect x="590" y="180" width="260" height="14" fill="#8b5cf6"/>
  <text x="720" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Contract 3: iPad Tutoring</text>
  <rect x="608" y="206" width="56" height="22" rx="6" fill="#ede9fe"/>
  <text x="636" y="221" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">INTENT</text>

  <text x="608" y="252" font-size="10" font-weight="600" fill="#64748b">State transitions:</text>
  <text x="608" y="270" font-size="10" fill="#8b5cf6" font-weight="600">1. INTENT — AI refining needs...</text>

  <text x="608" y="304" font-size="10" font-weight="600" fill="#64748b">AI is asking Dorothy:</text>
  <text x="608" y="322" font-size="10" fill="#1e293b">"What do you most want to</text>
  <text x="608" y="338" font-size="10" fill="#1e293b">learn on your iPad? Your</text>
  <text x="608" y="354" font-size="10" fill="#1e293b">daughter mentioned photos</text>
  <text x="608" y="370" font-size="10" fill="#1e293b">and email."</text>

  <text x="608" y="404" font-size="10" font-weight="600" fill="#64748b">Possible paths:</text>
  <text x="608" y="422" font-size="10" fill="#1e293b">a) Local tutor (in-person)</text>
  <text x="608" y="438" font-size="10" fill="#1e293b">b) Remote tutor (video)</text>
  <text x="608" y="454" font-size="10" fill="#1e293b">c) AI-guided (free, but</text>
  <text x="618" y="470" font-size="10" fill="#1e293b">   tech comfort = 1)</text>

  <text x="608" y="490" font-size="10" font-weight="600" fill="#64748b">Pending:</text>
  <text x="608" y="504" font-size="10" fill="#1e293b">Dorothy + daughter's input</text>

  <!-- Footer -->
  <text x="440" y="544" text-anchor="middle" font-size="11" fill="#64748b">Same protocol, same state machine, three contracts at different stages — Dorothy just sees "Getting you sorted!"</text>
  <text x="440" y="564" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">All complexity absorbed by the AI agent operating at Delegate autonomy level</text>
</svg>