<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Real-World Scenario: Dorothy's Home Help</text>
  <text x="430" y="50" text-anchor="middle" font-size="12" fill="#64748b">71-year-old widow, tech-comfort 1, autonomy level: Delegate — "I need a handyman I can trust"</text>

  <!-- Outcome box at top -->
  <rect x="230" y="70" width="400" height="50" rx="12" fill="#6366f1" filter="url(#shadow)"/>
  <text x="430" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Outcome: "Get reliable home help"</text>
  <text x="430" y="108" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Layer 5 — what Dorothy sees</text>

  <!-- Three contracts -->
  <!-- Contract 1: Gutter cleaning -->
  <rect x="30" y="155" width="250" height="340" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="155" width="250" height="40" rx="10" fill="#22c55e"/>
  <rect x="30" y="180" width="250" height="15" fill="#22c55e"/>
  <text x="155" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Contract 1: Gutter Cleaning</text>
  <rect x="45" y="205" width="70" height="22" rx="6" fill="#dcfce7"/>
  <text x="80" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">COMPLETE</text>

  <text x="45" y="248" font-size="10" font-weight="600" fill="#64748b">State transitions:</text>
  <text x="45" y="266" font-size="10" fill="#1e293b">1. INTENT — Dorothy: "gutters need cleaning"</text>
  <text x="45" y="282" font-size="10" fill="#1e293b">2. REQUIREMENTS — AI: one-story, 1200sqft</text>
  <text x="45" y="298" font-size="10" fill="#1e293b">3. MATCHING — 2 local handymen found</text>
  <text x="45" y="314" font-size="10" fill="#1e293b">4. PROPOSAL — Mike: $85, Tuesday 2pm</text>
  <text x="45" y="330" font-size="10" fill="#1e293b">5. NEGOTIATION — auto-accepted (in budget)</text>
  <text x="45" y="346" font-size="10" fill="#1e293b">6. ACTIVE — Mike confirmed, reminded Dorothy</text>
  <text x="45" y="362" font-size="10" fill="#1e293b">7. VERIFICATION — Dorothy: "looks great!"</text>
  <text x="45" y="378" font-size="10" fill="#22c55e" font-weight="600">8. COMPLETE — $85 released to Mike</text>

  <text x="45" y="405" font-size="10" font-weight="600" fill="#64748b">Handoffs:</text>
  <text x="45" y="420" font-size="10" fill="#1e293b">AI→Mike (capability: physical work)</text>
  <text x="45" y="435" font-size="10" fill="#1e293b">AI→Dorothy (autonomy: confirm completion)</text>
  <text x="45" y="460" font-size="10" font-weight="600" fill="#64748b">Autonomy gates triggered: 1</text>
  <text x="45" y="475" font-size="10" fill="#1e293b">(Delegate mode, but $85 is low-risk → auto)</text>

  <!-- Contract 2: Thermostat -->
  <rect x="305" y="155" width="250" height="340" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="305" y="155" width="250" height="40" rx="10" fill="#3b82f6"/>
  <rect x="305" y="180" width="250" height="15" fill="#3b82f6"/>
  <text x="430" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Contract 2: Thermostat Help</text>
  <rect x="320" y="205" width="70" height="22" rx="6" fill="#dbeafe"/>
  <text x="355" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">MATCHING</text>

  <text x="320" y="248" font-size="10" font-weight="600" fill="#64748b">State transitions:</text>
  <text x="320" y="266" font-size="10" fill="#1e293b">1. INTENT — "new thermostat confusing"</text>
  <text x="320" y="282" font-size="10" fill="#1e293b">2. REQUIREMENTS — AI: Honeywell T6,</text>
  <text x="330" y="296" font-size="10" fill="#1e293b">    needs in-person or video walkthrough</text>
  <text x="320" y="314" font-size="10" fill="#3b82f6" font-weight="600">3. MATCHING — searching for tech-savvy</text>
  <text x="330" y="328" font-size="10" fill="#3b82f6" font-weight="600">    handyman near Hayward, WI...</text>

  <text x="320" y="360" font-size="10" font-weight="600" fill="#64748b">Matching considerations:</text>
  <text x="320" y="378" font-size="10" fill="#1e293b">- Dorothy needs patience (frustration: rushing)</text>
  <text x="320" y="394" font-size="10" fill="#1e293b">- Prefers warmth, "good people" feel</text>
  <text x="320" y="410" font-size="10" fill="#1e293b">- Rural area = limited candidates</text>
  <text x="320" y="426" font-size="10" fill="#1e293b">- Budget-conscious but values reliability</text>

  <text x="320" y="460" font-size="10" font-weight="600" fill="#64748b">Confidence: 0.72</text>
  <text x="320" y="475" font-size="10" fill="#b45309">Uncertainty: rural area, few candidates</text>

  <!-- Contract 3: iPad tutoring -->
  <rect x="580" y="155" width="250" height="340" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="580" y="155" width="250" height="40" rx="10" fill="#8b5cf6"/>
  <rect x="580" y="180" width="250" height="15" fill="#8b5cf6"/>
  <text x="705" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Contract 3: iPad Tutoring</text>
  <rect x="595" y="205" width="55" height="22" rx="6" fill="#ede9fe"/>
  <text x="623" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">INTENT</text>

  <text x="595" y="248" font-size="10" font-weight="600" fill="#64748b">State transitions:</text>
  <text x="595" y="266" font-size="10" fill="#8b5cf6" font-weight="600">1. INTENT — AI refining requirements...</text>

  <text x="595" y="296" font-size="10" font-weight="600" fill="#64748b">AI is asking Dorothy:</text>
  <text x="595" y="314" font-size="10" fill="#1e293b">"What do you most want to learn</text>
  <text x="595" y="328" font-size="10" fill="#1e293b"> on your iPad? Your daughter</text>
  <text x="595" y="342" font-size="10" fill="#1e293b"> mentioned photos and email."</text>

  <text x="595" y="375" font-size="10" font-weight="600" fill="#64748b">Possible paths:</text>
  <text x="595" y="393" font-size="10" fill="#1e293b">a) Local tutor (in-person, preferred)</text>
  <text x="595" y="409" font-size="10" fill="#1e293b">b) Remote tutor (video, more options)</text>
  <text x="595" y="425" font-size="10" fill="#1e293b">c) AI-guided self-paced (free, but</text>
  <text x="595" y="439" font-size="10" fill="#1e293b">    Dorothy's tech comfort = 1)</text>

  <text x="595" y="468" font-size="10" font-weight="600" fill="#64748b">Decision pending on:</text>
  <text x="595" y="483" font-size="10" fill="#1e293b">Dorothy's response + daughter's input</text>

  <!-- Connection lines from Outcome to contracts -->
  <line x1="330" y1="120" x2="155" y2="153" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="120" x2="430" y2="153" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="120" x2="705" y2="153" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="430" y="530" text-anchor="middle" font-size="11" fill="#64748b">Same protocol, same state machine, three contracts at different stages — Dorothy just sees "Getting you sorted!"</text>
  <text x="430" y="548" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">All complexity absorbed by the AI agent operating at Delegate autonomy level</text>
</svg>