<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Contract State Machine</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#64748b">Every Work Contract follows this lifecycle regardless of participant types</text>

  <!-- Main flow states -->
  <!-- INTENT -->
  <rect x="30" y="100" width="100" height="44" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">INTENT</text>

  <!-- REQUIREMENTS -->
  <rect x="168" y="100" width="120" height="44" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="228" y="127" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">REQUIREMENTS</text>

  <!-- MATCHING -->
  <rect x="326" y="100" width="100" height="44" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="376" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">MATCHING</text>

  <!-- PROPOSAL -->
  <rect x="464" y="100" width="100" height="44" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="514" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">PROPOSAL</text>

  <!-- NEGOTIATION -->
  <rect x="602" y="100" width="120" height="44" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="662" y="127" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">NEGOTIATION</text>

  <!-- ACTIVE -->
  <rect x="760" y="100" width="100" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">ACTIVE</text>

  <!-- VERIFICATION -->
  <rect x="760" y="220" width="110" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="815" y="247" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">VERIFICATION</text>

  <!-- COMPLETE -->
  <rect x="760" y="340" width="100" height="44" rx="22" fill="#22c55e" filter="url(#shadow)"/>
  <text x="810" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">COMPLETE</text>

  <!-- DISPUTED -->
  <rect x="570" y="220" width="100" height="44" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">DISPUTED</text>

  <!-- Terminal states -->
  <!-- CANCELLED -->
  <rect x="80" y="310" width="100" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">CANCELLED</text>

  <!-- EXPIRED -->
  <rect x="220" y="310" width="100" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">EXPIRED</text>

  <!-- FAILED -->
  <rect x="360" y="310" width="100" height="38" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="410" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">FAILED</text>

  <!-- Main flow arrows -->
  <line x1="130" y1="122" x2="166" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="288" y1="122" x2="324" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="426" y1="122" x2="462" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="564" y1="122" x2="600" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="722" y1="122" x2="758" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ACTIVE → VERIFICATION -->
  <line x1="815" y1="144" x2="815" y2="218" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="830" y="185" font-size="9" fill="#64748b">work</text>
  <text x="830" y="196" font-size="9" fill="#64748b">delivered</text>

  <!-- VERIFICATION → COMPLETE -->
  <line x1="815" y1="264" x2="815" y2="338" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="830" y="300" font-size="9" fill="#64748b">criteria</text>
  <text x="830" y="311" font-size="9" fill="#64748b">met</text>

  <!-- VERIFICATION → DISPUTED -->
  <line x1="760" y1="242" x2="672" y2="242" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="716" y="236" font-size="9" fill="#dc2626">buyer</text>
  <text x="716" y="247" font-size="9" fill="#dc2626">disputes</text>

  <!-- DISPUTED → COMPLETE (resolved) -->
  <path d="M 620 264 L 620 362 L 758 362" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
  <text x="640" y="340" font-size="9" fill="#64748b">resolved</text>

  <!-- DISPUTED → FAILED -->
  <path d="M 570 252 L 462 310" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>
  <text x="498" y="270" font-size="9" fill="#dc2626">unresolvable</text>

  <!-- Cancellation arrows (from early states to CANCELLED) -->
  <path d="M 80 144 L 80 250 L 130 308" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <path d="M 228 144 L 228 250 L 200 308" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Expiry arrow (from MATCHING) -->
  <path d="M 376 144 L 376 250 L 300 308" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Flow labels -->
  <text x="148" y="112" font-size="8" fill="#64748b">AI parses</text>
  <text x="306" y="112" font-size="8" fill="#64748b">search</text>
  <text x="446" y="112" font-size="8" fill="#64748b">propose</text>
  <text x="584" y="112" font-size="8" fill="#64748b">agree</text>
  <text x="742" y="112" font-size="8" fill="#64748b">commit</text>

  <!-- Autonomy gate indicators -->
  <rect x="30" y="420" width="840" height="80" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="443" font-size="12" font-weight="700" fill="#1e293b">Autonomy Gates</text>
  <text x="50" y="462" font-size="10" fill="#64748b">Advisor: human approves every transition</text>
  <text x="50" y="478" font-size="10" fill="#64748b">Facilitator: auto through discovery, human approves commitments</text>
  <text x="50" y="494" font-size="10" fill="#64748b">Agent: auto within pre-authorized bounds (budget, category)</text>
  <text x="450" y="462" font-size="10" fill="#64748b">Delegate: auto within risk limits, human notified</text>
  <text x="450" y="478" font-size="10" fill="#64748b">Risk threshold = f(autonomy_level, contract_value, category)</text>
  <text x="450" y="494" font-size="10" fill="#f59e0b" font-weight="600">Higher autonomy + higher risk = still requires approval</text>
</svg>