<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Contract State Machine</text>
  <text x="460" y="52" text-anchor="middle" font-size="12" fill="#64748b">Every Work Contract follows this lifecycle regardless of participant types</text>

  <!-- Flow labels ABOVE the state boxes -->
  <text x="155" y="88" text-anchor="middle" font-size="9" fill="#64748b">AI parses</text>
  <text x="312" y="88" text-anchor="middle" font-size="9" fill="#64748b">search</text>
  <text x="452" y="88" text-anchor="middle" font-size="9" fill="#64748b">propose</text>
  <text x="592" y="88" text-anchor="middle" font-size="9" fill="#64748b">agree</text>
  <text x="742" y="88" text-anchor="middle" font-size="9" fill="#64748b">commit</text>

  <!-- Main flow states -->
  <!-- INTENT -->
  <rect x="40" y="105" width="100" height="44" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">INTENT</text>

  <!-- REQUIREMENTS -->
  <rect x="178" y="105" width="124" height="44" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">REQUIREMENTS</text>

  <!-- MATCHING -->
  <rect x="340" y="105" width="104" height="44" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="392" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">MATCHING</text>

  <!-- PROPOSAL -->
  <rect x="482" y="105" width="100" height="44" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="532" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">PROPOSAL</text>

  <!-- NEGOTIATION -->
  <rect x="620" y="105" width="124" height="44" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="682" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">NEGOTIATION</text>

  <!-- ACTIVE -->
  <rect x="782" y="105" width="100" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="832" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">ACTIVE</text>

  <!-- Main flow arrows -->
  <line x1="140" y1="127" x2="176" y2="127" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="302" y1="127" x2="338" y2="127" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="127" x2="480" y2="127" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="582" y1="127" x2="618" y2="127" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="744" y1="127" x2="780" y2="127" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ACTIVE → VERIFICATION -->
  <rect x="782" y="230" width="116" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="840" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">VERIFICATION</text>

  <line x1="832" y1="149" x2="832" y2="228" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="852" y="192" font-size="9" fill="#64748b">work</text>
  <text x="852" y="204" font-size="9" fill="#64748b">delivered</text>

  <!-- VERIFICATION → COMPLETE -->
  <rect x="782" y="350" width="100" height="44" rx="22" fill="#22c55e" filter="url(#shadow)"/>
  <text x="832" y="377" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">COMPLETE</text>

  <line x1="840" y1="274" x2="840" y2="348" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="860" y="310" font-size="9" fill="#64748b">criteria</text>
  <text x="860" y="322" font-size="9" fill="#64748b">met</text>

  <!-- DISPUTED -->
  <rect x="590" y="230" width="104" height="44" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="642" y="257" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">DISPUTED</text>

  <!-- VERIFICATION → DISPUTED -->
  <line x1="782" y1="252" x2="696" y2="252" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="738" y="244" text-anchor="middle" font-size="9" fill="#dc2626">buyer disputes</text>

  <!-- DISPUTED → COMPLETE (resolved) -->
  <path d="M 642 274 L 642 372 L 780 372" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
  <text x="660" y="348" font-size="9" fill="#64748b">resolved</text>

  <!-- DISPUTED → FAILED -->
  <rect x="380" y="320" width="100" height="38" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" filter="url(#shadow)"/>
  <text x="430" y="344" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">FAILED</text>

  <path d="M 590 264 L 482 320" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>
  <text x="520" y="282" font-size="9" fill="#dc2626">unresolvable</text>

  <!-- Terminal states -->
  <!-- CANCELLED -->
  <rect x="80" y="320" width="100" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="344" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">CANCELLED</text>

  <!-- EXPIRED -->
  <rect x="220" y="320" width="100" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="344" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">EXPIRED</text>

  <!-- Cancellation arrows (from early states to CANCELLED) -->
  <path d="M 90 149 L 90 260 L 130 318" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <path d="M 240 149 L 240 275 L 170 318" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Expiry arrow (from MATCHING) -->
  <path d="M 392 149 L 392 275 L 310 318" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Autonomy gate info box -->
  <rect x="40" y="440" width="840" height="85" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="463" font-size="12" font-weight="700" fill="#1e293b">Autonomy Gates</text>

  <text x="60" y="482" font-size="10" fill="#64748b">Advisor: human approves every transition</text>
  <text x="60" y="498" font-size="10" fill="#64748b">Facilitator: auto through discovery, human approves commitments</text>
  <text x="60" y="514" font-size="10" fill="#64748b">Agent: auto within pre-authorized bounds (budget, category)</text>

  <text x="480" y="482" font-size="10" fill="#64748b">Delegate: auto within risk limits, human notified</text>
  <text x="480" y="498" font-size="10" fill="#64748b">Risk threshold = f(autonomy_level, contract_value, category)</text>
  <text x="480" y="514" font-size="10" fill="#f59e0b" font-weight="600">Higher autonomy + higher risk = still requires approval</text>

  <!-- Legend for terminal states -->
  <text x="130" y="385" text-anchor="middle" font-size="9" fill="#94a3b8">any pre-ACTIVE state</text>
  <text x="270" y="385" text-anchor="middle" font-size="9" fill="#94a3b8">timeout / no match</text>
  <text x="430" y="385" text-anchor="middle" font-size="9" fill="#94a3b8">unrecoverable</text>
</svg>